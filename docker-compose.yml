services:
  db:
    image: postgres:16-alpine
    container_name: minority_game_db
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: minority_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/pg_hba.conf:/etc/postgresql/pg_hba.conf
    env_file:
      - .env

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: minority_game_backend
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/minority_db
      CORS_ORIGIN: https://minority.pelicanlab.dev
      RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
      CONTRACT_ADDRESS: "0xcc85532687565f7bd7b33bc500eea2efa0d21bcf"
      DEPLOY_BLOCK: 10565881
      POLL_INTERVAL_MS: 12000
      RESOLVER_PRIVATE_KEY: ${RESOLVER_PRIVATE_KEY}
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://minority.pelicanlab.dev/api
        NEXT_PUBLIC_CONTRACT_ADDRESS: "0xcc85532687565f7bd7b33bc500eea2efa0d21bcf"
    container_name: minority_game_frontend
    ports:
      - "3010:3010"
    depends_on:
      - backend

volumes:
  pgdata:
